# ─── CineBase Production Config (Railway) ────────────
# Activate with: SPRING_PROFILES_ACTIVE=prod
#
# Railway auto-injects these MySQL env vars:
#   MYSQLHOST, MYSQLPORT, MYSQLUSER, MYSQLPASSWORD, MYSQLDATABASE

spring:
  datasource:
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
  sql:
    init:
      mode: never  # schema.sql runs manually first time only

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

file:
  upload-dir: /tmp/uploads

# ── JWT ──────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}

# ── Knife4j (disable in prod) ────────────────────────
knife4j:
  enable: false
