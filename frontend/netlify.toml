# CineBase Frontend — Netlify Deployment Config
[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback: all routes → index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
