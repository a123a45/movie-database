# CineBase Frontend — Netlify Deployment Config
[build]
  command = "npm run build"
  publish = "dist"

# Proxy uploads to Railway backend (images, posters)
[[redirects]]
  from = "/uploads/*"
  to = "https://movie-database1125.up.railway.app/uploads/:splat"
  status = 200

# SPA fallback: all routes → index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
